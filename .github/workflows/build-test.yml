name: Run tests

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, windows-latest, macos-latest, macos-15-intel]
        build_type: [Release]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v6

    - name: Configure CMake
      run: >
        cmake -B ${{ matrix.build_type }}
        -G "Ninja"
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -S ${{ github.workspace }}

    - name: Build
      run: cmake --build ${{ matrix.build_type }} --config ${{ matrix.build_type }}

    - name: Test
      working-directory: ${{ matrix.build_type }}
      run: ctest --build-config ${{ matrix.build_type }}

    - uses: actions/upload-artifact@v7
      if: ${{ !cancelled() }}
      with:
        name: ${{ matrix.os }}-${{ matrix.build_type }}
        path: ${{ matrix.build_type }}

  build-ffts:
    strategy:
      fail-fast: false
      matrix:
        build_type: [Release]
        fft_flag: [-DWITH_AVFFT=ON, -DWITH_PFFFT=OFF]
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Install libavcodec
      run: sudo apt install libavcodec-dev

    - name: Configure CMake
      run: >
        cmake -B ${{ matrix.build_type }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        ${{ matrix.fft_flag }}
        -S ${{ github.workspace }}

    - name: Build
      run: cmake --build ${{ matrix.build_type }} --config ${{ matrix.build_type }}

    - name: Test
      working-directory: ${{ matrix.build_type }}
      run: ctest --build-config ${{ matrix.build_type }}

    - uses: actions/upload-artifact@v7
      if: ${{ !cancelled() }}
      with:
        name: ${{ matrix.fft_flag }}-${{ matrix.build_type }}
        path: ${{ matrix.build_type }}
